name: "Push"

on:
  push:
  workflow_dispatch:

env:
  FORCE_COLOR: 3

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Cache Docker image
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/image.tar
          key: neracoos-climatology-image-${{ github.sha }}
          restore-keys: |
            neracoos-climatology-image-

      - name: "Login to Docker Hub"
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        continue-on-error: true
        with:
          username: gmri
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          tags: gmri/neracoos-climatology-py-dash:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

  e2e:
    name: End-to-end tests
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cache Docker image
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/image.tar
          key: neracoos-climatology-image-${{ github.sha }}

      - name: Load Docker image
        run: |
          docker load --input /tmp/image.tar
          docker image ls -a

      - name: Run app container
        run:
          docker run -d --name climatology -p 8080:8080
          gmri/neracoos-climatology-py-dash:latest

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          environments: test
          cache: true

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pixi.lock') }}

      - name: Install Playwright browsers
        run: pixi run -e test playwright install --with-deps chromium

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/health && exit 0
            sleep 2
          done
          echo "App container did not become ready within 120 seconds" >&2
          exit 1

      - name: Run end-to-end tests
        run: E2E_BASE_URL=http://localhost:8080 pixi run -e test e2e

      - name: Show app container logs
        if: failure()
        run: docker logs climatology

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-test-results
          path: test-results/

  pass:
    name: Check all jobs passed
    if: always()
    needs: [build, e2e]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}

  push:
    name: Push Docker Image
    needs: [build, e2e]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    outputs:
      tag: ${{ steps.tagName.outputs.tag }}
      image_digest: ${{ steps.push.outputs.image_digest }}

    if: |
      github.repository == 'gulfofmaine/climatology_py_dash'
      && github.ref == 'refs/heads/main'

    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Get tag name
        id: tagName
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Cache Docker image
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/image.tar
          key: neracoos-climatology-image-${{ github.sha }}

      - name: Load Docker image
        run: |
          docker load --input /tmp/image.tar
          docker image ls -a

      - name: "Login to Docker Hub"
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: gmri
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        id: push
        env:
          TAG: ${{ steps.tagName.outputs.tag }}
        run: |
          docker tag gmri/neracoos-climatology-py-dash:latest "gmri/neracoos-climatology-py-dash:$TAG"
          docker push "gmri/neracoos-climatology-py-dash:$TAG"
          echo "image_digest=$(docker inspect --format='{{index .RepoDigests 0}}' gmri/neracoos-climatology-py-dash:$TAG | cut -d@ -f2)" >> $GITHUB_OUTPUT

  notify:
    needs: [push]
    if: |
      github.repository == 'gulfofmaine/climatology_py_dash'
      && github.ref == 'refs/heads/main'
    uses: gulfofmaine/odp-releaser/.github/workflows/notify.yml@52b11709c1fb73c142b24b62ce7a11ecb37f7da3
    permissions:
      contents: read
      pull-requests: read # ODP Releaser wants to figure out who made a PR
    with:
      image_name: gmri/neracoos-climatology-py-dash
      tag: ${{ needs.push.outputs.tag }}
      digest: ${{ needs.push.outputs.image_digest }}
      environment: notify # optional gate
      # deploy_targets_path: .github/deploy_targets.yaml  # optional
      verbosity: 3 # optional, default
    secrets:
      dispatch_app_id: ${{ secrets.GULFOFMAINE_ODP_DISPATCH_APP_ID }}
      dispatch_app_private_key:
        ${{ secrets.GULFOFMAINE_ODP_DISPATCH_PRIVATE_KEY }}
